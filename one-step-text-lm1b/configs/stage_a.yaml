# Stage A v3: frozen Qwen2.5-0.5B hidden states + full-dimensional TarFlow.
# Key changes vs v2:
#   - remove PCA / projection bottleneck
#   - remove Stage A decoder and reconstruction loss
#   - train only TarFlow to Gaussianize full 896-d Qwen hidden states

model:
  d: 896
  qwen_model: Qwen/Qwen2.5-0.5B
  qwen_hidden: 896
  sigma: 0.05
  seq_len: 128

normalization:
  stats_filename: qwen_hidden_stats.pt
  std_floor: 1.0e-3
  recompute: false

flow:
  type: tarflow
  num_blocks: 8
  layers_per_block: 8
  channels: 1024
  head_dim: 128
  expansion: 4

training:
  batch_size: 64
  train_subset_fraction: 0.01
  train_subset_seed: 1337
  lr: 1.0e-6
  weight_decay: 1.0e-2
  warmup_steps: 10000
  max_steps: 1000000
  grad_clip: 1.0
  mixed_precision: true
  log_every: 100
  eval_every: 10000
  prior_samples: 8
  prior_z_scale: 1.0
  prior_temperature: 0.7
  prior_top_p: 0.95

lightning:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: ddp
  log_every_n_steps: 1

wandb:
  entity: null
  project: coupling-models-lm1b
  run_name: null
  tags: [stage_a, tarflow, qwen]
  log_every: 100
  save_artifact: false
