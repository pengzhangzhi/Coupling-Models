# Stage B v2: gated-residual generator + auxiliary z-reconstruction loss.
#
# Architecture changes vs v1:
#   - AdaLN removed (diagnostic: zeroing it improved CE by 0.48)
#   - Zero-init per-channel gates on every residual (SA, CA, FFN)
#     → model starts as identity z→tokens, residual paths earn their magnitude
#   - LayerNorm on cross-attention K/V (prevents value-projection norm explosion)
#   - Auxiliary z-reconstruction head (MSE loss, λ=0.1)
#     → directly penalises z-invariant hidden states

generator:
  arch: transformer
  width: 768
  depth: 12
  num_heads: 12
  ffn_dim: 2048

training:
  stage_a_checkpoint: checkpoints/stage_a/v3_lm1b/checkpoint.ckpt
  # latent_dim is loaded from the Stage A checkpoint; keep generator width independent
  batch_size: 32
  lr: 2.0e-4
  weight_decay: 0.01
  warmup_steps: 2000
  max_steps: 400000
  restart_period: 50000
  grad_clip: 1.0
  ema_decay: 0.999
  label_smoothing: 0.05
  mixed_precision: false
  compile: false
  sample_z_scale: 1.00
  z_gauss_prob: 0.30
  sample_every: 2000
  num_samples: 4
  lambda_kd: 1.0
  lambda_recon: 0.1       # auxiliary z-reconstruction loss weight
  lambda_nce: 0.1         # InfoNCE contrastive loss weight
  nce_temperature: 0.1    # softmax temperature for NCE scores
  nce_warmup_steps: 2000  # delay NCE until CE has stabilised
  kd_temperature: 2.0
  log_every: 50

lightning:
  accelerator: gpu
  devices: 4
  num_nodes: 1
  strategy: ddp
  log_every_n_steps: 1

wandb:
  entity: null
  project: coupling-models-lm1b
  run_name: null
  tags: [stage_b, gated-residual, qwen-kd]
  save_artifact: false
